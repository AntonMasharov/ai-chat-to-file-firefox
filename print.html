<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat to PDF — Print</title>
  <style>
    body {
      margin: 0; padding: 0;
      background: #1a1a2e;
      font-family: sans-serif;
      color: #e0e0f0;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #2a2a4a;
      border-top-color: #7eb8ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; color: #8888aa; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Preparing your PDF…</p>
  </div>
  <script src="print.js"></script>
</body>
</html>
